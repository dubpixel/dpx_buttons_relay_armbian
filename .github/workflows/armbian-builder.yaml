      custom-board:
        description: 'Any Armbian board ID not in the list above (overrides the dropdown)'
        required: false
        default: ''
        type: string
  workflow_call:
    inputs:
      armbian-board:
        description: 'Armbian board target'
        required: true
        type: string
    secrets:
      ROOT_PASSWORD:
        required: false
    outputs:
      artifact-name:
        description: 'Name of the uploaded artifact'
        value: ${{ jobs.build.outputs.artifact-name }}
      buttons-version:
        description: 'Buttons version installed in this image'
        value: ${{ jobs.build.outputs.buttons-version }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      artifact-name: ${{ steps.meta.outputs.artifact-name }}
      buttons-version: ${{ steps.meta.outputs.buttons-version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Resolve board — custom-board overrides the dropdown if set
      - name: Resolve target board
        id: board
        run: |
          CUSTOM="${{ inputs.custom-board }}"
          SELECTED="${{ steps.board.outputs.board }}"
          BOARD="${CUSTOM:-$SELECTED}"
          echo "board=${BOARD}" >> "$GITHUB_OUTPUT"
          echo "Building for board: ${BOARD}"

      # ARM emulation is required to chroot into the ARM64 Armbian image
      - name: Install QEMU user-static
        run: sudo apt-get install -y qemu-user-static

      # ── Download Bitfocus Buttons package from mirror ──────────────────────
      - name: Download Buttons USB Relay package from mirror
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACTS_DIR: artifacts
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/download-buttons.sh

      - name: Read version and set metadata
        id: meta
        run: |
          VERSION=$(cat artifacts/buttons-version.txt)
          BUILD_VERSION=$(cat VERSION)
          BOARD="${{ steps.board.outputs.board }}"
          ARTIFACT_NAME="${BOARD}-buttons-usb-relay-${VERSION}-build${BUILD_VERSION}"
          echo "buttons-version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact-name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "Board   : ${BOARD}"
          echo "Version : ${VERSION}"
          echo "Build   : ${BUILD_VERSION}"
          echo "Artifact: ${ARTIFACT_NAME}"

      # ── Build base Armbian image ────────────────────────────────────────────
      - name: Clone Armbian build framework
        run: git clone --depth=1 https://github.com/armbian/build build

      - name: Build Armbian image
        run: |
          sudo ./build/compile.sh build \
            BOARD=${{ steps.board.outputs.board }} \
            BRANCH=current \
            RELEASE=noble \
            BUILD_MINIMAL=yes \
            KERNEL_CONFIGURE=no \
            COMPRESS_OUTPUTIMAGE=no
          sudo mv build/output/images/*.img build/output/images/armbian.img

      # ── Customize image with Packer ────────────────────────────────────────
      - name: Install Packer
        run: |
          wget -qO - https://apt.releases.hashicorp.com/gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] \
            https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update -q && sudo apt-get install -y packer

      - name: Initialize Packer plugins
        run: sudo packer init buttons-usb-relay.pkr.hcl

      - name: Build customized image with Packer
        env:
          ROOT_PASSWORD: ${{ secrets.ROOT_PASSWORD }}
        run: |
          sudo packer build \
            -var "url=build/output/images/armbian.img" \
            -var "build=$(cat artifacts/buttons-version.txt)" \
            -var "deb_path=artifacts/bitfocus-buttons-usb-relay-headless.deb" \
            -var "root_password=${ROOT_PASSWORD}" \
            buttons-usb-relay.pkr.hcl

      # ── Compress and upload ────────────────────────────────────────────────
      - name: Install zerofree
        run: sudo apt-get install -y zerofree

      - name: Zero free space and compress image
        run: |
          IMG="output-buttonspi/armbian-buttons-usb-relay.img"
          VERSION=$(cat artifacts/buttons-version.txt)
          BUILD_VERSION=$(cat VERSION)
          BOARD="${{ steps.board.outputs.board }}"
          FINAL_NAME="${BOARD}-buttons-usb-relay-${VERSION}-build${BUILD_VERSION}.img"

          LOOP=$(sudo losetup -fP --show "$IMG")
          ROOT_PART="${LOOP}p1"
          sudo e2fsck -fy "$ROOT_PART" || true
          sudo zerofree "$ROOT_PART"
          sudo losetup -d "$LOOP"

          sudo mv "$IMG" "$FINAL_NAME"
          sudo gzip -n "$FINAL_NAME"
          # Hand ownership back to the runner so upload-artifact can read the file
          sudo chown runner:runner "${FINAL_NAME}.gz"
          echo "COMPRESSED_IMAGE=${FINAL_NAME}.gz" >> "$GITHUB_ENV"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact-name }}
          path: ${{ env.COMPRESSED_IMAGE }}
          retention-days: 7
          if-no-files-found: error
